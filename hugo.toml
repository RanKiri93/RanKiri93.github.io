[languages.he]
  weight = 1
  languageName = 'עברית'
  contentDir = 'content'

  [languages.he.params]
    [languages.he.params.hero]
      enable = true
      intro = 'שלום, אני'
      title = 'רן קירי'
      subtitle = 'דוקטורנט ומרצה בטכניון'
      content = 'סטודנט לתואר דוקטור במתמטיקה בטכניון. מתעניין במבנה הגיאומטרי של מערכות אופרטורים ובהוראה.'
      image = '/profile.png'
    [languages.he.params.hero.button]
      enable = true
      name = 'קורות חיים'
      url = '/CV.pdf'
      download = true
    [languages.he.params.hero.bottomImage]
      enable = false
    [languages.he.params.about]
      enable = true
      title = 'אודות'
      content = '''אני סטודנט לתואר דוקטור במתמטיקה בטכניון תחת הנחיית הפרופסור אור משה שליט. אני מתעניין במבנה הגיאומטרי של מערכות אופרטורים (Operator Systems), והקשר בינו לבין תכונות של מערכות אלה והאלגבראות שהן יוצרות. לאחרונה עיסוקיי כוללים גם חקירה של אופרטורים העולים כחלק מהשערת ה-Essential Normality של William Arveson, וחקירת גרסאות אפשריות נוספות של אי-שוויונים בסגנון Von-Neumann.

לצד עיסוקיי במחקר, אני עוסק רבות בהוראה הן כמתרגל והן כמרצה בקורסי מתמטיקה בטכניון, ומתעניין בקידום הוראת המתמטיקה בטכניון ובכלל—בפן הטכנולוגי ובפן הפדגוגי.'''

