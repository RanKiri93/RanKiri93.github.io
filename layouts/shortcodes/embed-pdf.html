{{- $url := .Get "url" -}}
{{- $height := .Get "height" | default "80vh" -}}
{{- if $url -}}
<div class="embed-pdf-wrapper" style="width: 100%; max-width: 100%; margin: 1rem 0;">
  <p style="margin-bottom: 0.5rem;">
    <a href="{{ $url }}" target="_blank" rel="noopener" style="font-weight: 500;">{{ i18n "open_pdf" | default "Open PDF in new tab" }}</a>
  </p>
  <div style="border-radius: 0.5rem; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); background: #f5f5f5;">
    <object
      data="{{ $url }}"
      type="application/pdf"
      style="width: 100%; min-height: 400px; height: {{ $height }}; display: block;"
      title="Embedded PDF"
    >
      <iframe
        src="{{ $url }}"
        style="width: 100%; min-height: 400px; height: {{ $height }}; border: none; display: block;"
        title="Embedded PDF"
      ></iframe>
      <p style="padding: 1rem; text-align: center; color: #333;">
        Your browser cannot display the PDF inline. Use the link above to open it.
      </p>
    </object>
  </div>
</div>
{{- else -}}
{{- errorf "shortcode embed-pdf: missing required 'url' parameter" -}}
{{- end -}}
